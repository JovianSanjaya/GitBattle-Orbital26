<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1b0d47" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5a4f7b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- START pill -->
  <rect x="255" y="20" width="170" height="40" rx="20" fill="#1b0d47" stroke="#000000" stroke-width="1"/>
  <text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#ffffff" font-family="sans-serif">Open GitBattle</text>

  <line x1="340" y1="60" x2="340" y2="90" stroke="#1b0d47" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="240" y="90" width="200" height="40" rx="8" fill="#a9c6ff" stroke="#000000" stroke-width="1"/>
  <text x="340" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">See landing page</text>

  <line x1="340" y1="130" x2="340" y2="160" stroke="#1b0d47" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="240" y="160" width="200" height="40" rx="8" fill="#a9c6ff" stroke="#000000" stroke-width="1"/>
  <text x="340" y="180" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Log in with Google</text>

  <line x1="340" y1="200" x2="340" y2="230" stroke="#1b0d47" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="220" y="230" width="240" height="40" rx="8" fill="#ffe28a" stroke="#000000" stroke-width="1"/>
  <text x="340" y="250" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Choose a mode</text>

  <line x1="220" y1="250" x2="130" y2="250" stroke="#5a4f7b" stroke-width="1"/>
  <line x1="130" y1="250" x2="130" y2="290" stroke="#5a4f7b" stroke-width="1" marker-end="url(#arrow-muted)"/>
  <line x1="460" y1="250" x2="550" y2="250" stroke="#5a4f7b" stroke-width="1"/>
  <line x1="550" y1="250" x2="550" y2="290" stroke="#5a4f7b" stroke-width="1" marker-end="url(#arrow-muted)"/>

  <line x1="340" y1="270" x2="340" y2="760" stroke="#5a4f7b" stroke-width="0.5" stroke-dasharray="4 3"/>

  <text x="130" y="283" text-anchor="middle" font-size="12" fill="#5a4f7b" font-family="sans-serif">Solo</text>
  <text x="550" y="283" text-anchor="middle" font-size="12" fill="#5a4f7b" font-family="sans-serif">Multiplayer</text>

  <!-- SOLO -->
  <rect x="50" y="290" width="160" height="40" rx="8" fill="#ffffff" stroke="#0097b2" stroke-width="1.5"/>
  <text x="130" y="310" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Browse puzzles</text>
  <line x1="130" y1="330" x2="130" y2="360" stroke="#0097b2" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="50" y="360" width="160" height="40" rx="8" fill="#ffffff" stroke="#0097b2" stroke-width="1.5"/>
  <text x="130" y="380" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Pick a puzzle</text>
  <line x1="130" y1="400" x2="130" y2="430" stroke="#0097b2" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="36" y="430" width="188" height="40" rx="8" fill="#ffffff" stroke="#0097b2" stroke-width="1.5"/>
  <text x="130" y="450" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">See target git graph</text>
  <line x1="130" y1="470" x2="130" y2="500" stroke="#0097b2" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="36" y="500" width="188" height="40" rx="8" fill="#ffffff" stroke="#0097b2" stroke-width="1.5"/>
  <text x="130" y="520" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Type git commands</text>
  <line x1="130" y1="540" x2="130" y2="570" stroke="#0097b2" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="36" y="570" width="188" height="40" rx="8" fill="#ffffff" stroke="#0097b2" stroke-width="1.5"/>
  <text x="130" y="590" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Graph updates live</text>

  <path d="M 224 590 L 248 590 L 248 520 L 224 520" fill="none" stroke="#5a4f7b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-muted)"/>
  <text x="254" y="558" text-anchor="start" font-size="12" fill="#5a4f7b" font-family="sans-serif">keep trying</text>

  <line x1="130" y1="610" x2="130" y2="640" stroke="#16866a" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="50" y="640" width="160" height="40" rx="8" fill="#f7ffe3" stroke="#16866a" stroke-width="1.5"/>
  <text x="130" y="660" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#16866a" font-family="sans-serif">Puzzle solved!</text>
  <line x1="130" y1="680" x2="130" y2="710" stroke="#16866a" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="50" y="710" width="160" height="40" rx="8" fill="#f7ffe3" stroke="#16866a" stroke-width="1.5"/>
  <text x="130" y="730" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#16866a" font-family="sans-serif">Progress saved</text>

  <!-- MULTIPLAYER -->
  <rect x="470" y="290" width="160" height="40" rx="8" fill="#ffffff" stroke="#c45f3e" stroke-width="1.5"/>
  <text x="550" y="310" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Create / join room</text>
  <line x1="550" y1="330" x2="550" y2="360" stroke="#c45f3e" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="470" y="360" width="160" height="40" rx="8" fill="#ffffff" stroke="#c45f3e" stroke-width="1.5"/>
  <text x="550" y="380" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Ready up</text>
  <line x1="550" y1="400" x2="550" y2="430" stroke="#c45f3e" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="470" y="430" width="160" height="40" rx="8" fill="#ffffff" stroke="#c45f3e" stroke-width="1.5"/>
  <text x="550" y="450" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Host starts game</text>
  <line x1="550" y1="470" x2="550" y2="500" stroke="#c45f3e" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="456" y="500" width="188" height="40" rx="8" fill="#ffc0e8" stroke="#c45f3e" stroke-width="1.5"/>
  <text x="550" y="520" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Race to solve puzzle</text>
  <line x1="550" y1="540" x2="550" y2="570" stroke="#c45f3e" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="470" y="570" width="160" height="40" rx="8" fill="#f7ffe3" stroke="#16866a" stroke-width="1.5"/>
  <text x="550" y="590" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#16866a" font-family="sans-serif">First to finish wins</text>
  <line x1="550" y1="610" x2="550" y2="640" stroke="#16866a" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <rect x="456" y="640" width="188" height="40" rx="8" fill="#f7ffe3" stroke="#16866a" stroke-width="1.5"/>
  <text x="550" y="660" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#16866a" font-family="sans-serif">See winner screen</text>

  <!-- Merge -->
  <line x1="130" y1="750" x2="130" y2="780" stroke="#5a4f7b" stroke-width="1"/>
  <line x1="550" y1="680" x2="550" y2="780" stroke="#5a4f7b" stroke-width="1"/>
  <line x1="130" y1="780" x2="550" y2="780" stroke="#5a4f7b" stroke-width="1"/>
  <line x1="340" y1="780" x2="340" y2="810" stroke="#1b0d47" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="810" width="280" height="40" rx="8" fill="#ffe28a" stroke="#000000" stroke-width="1"/>
  <text x="340" y="830" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#1b0d47" font-family="sans-serif">Play again or browse docs</text>

  <line x1="340" y1="850" x2="340" y2="878" stroke="#1b0d47" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- END pill -->
  <rect x="265" y="878" width="150" height="36" rx="18" fill="#1b0d47" stroke="#000000" stroke-width="1"/>
  <text x="340" y="896" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#ffffff" font-family="sans-serif">Done</text>
</svg>
